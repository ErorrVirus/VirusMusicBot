

services:
  # This container downloads your bot's code from GitHub and runs it!
  bot:
    image: node:22-alpine
    container_name: virusmusic_bot
    restart: unless-stopped
    working_dir: /app
    network_mode: "host"
    depends_on:
      lavalink:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "apk add --no-cache git && 
      rm -rf /app/* /app/.[!.]* /app/..?* &&
      git clone https://github.com/ErorrVirus/VirusMusicBot.git . &&
      npm ci --only=production && 
      node src/index.js"
    environment:
      - PORT=3005
      - LAVALINK_HOST=127.0.0.1
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}

  # This container downloads your application.yml configuration for Lavalink!
  lavalink_init:
    image: alpine
    container_name: virusmusic_lavalink_init
    network_mode: "host"
    volumes:
      - lavalink_data:/opt/Lavalink
    command: >
      sh -c "apk add --no-cache wget && 
      wget -O /opt/Lavalink/application.yml https://raw.githubusercontent.com/ErorrVirus/VirusMusicBot/main/application.yml"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.0.5
    container_name: virusmusic_lavalink
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      lavalink_init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --header=\"Authorization: $$LAVALINK_SERVER_PASSWORD\" http://127.0.0.1:2333/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      - _JAVA_OPTIONS=-Xmx1G -Djava.net.preferIPv4Stack=true
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
    volumes:
      - lavalink_data:/opt/Lavalink
volumes:
  lavalink_data:
