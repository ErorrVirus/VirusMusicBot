version: '3.8'

services:
  # This container downloads your bot's code from GitHub and runs it!
  bot:
    image: node:22-alpine
    container_name: virusmusic_bot
    restart: unless-stopped
    working_dir: /app
    depends_on:
      lavalink:
        condition: service_started
    command: >
      sh -c "apk add --no-cache git && 
      rm -rf ./* &&
      git clone https://github.com/ErorrVirus/VirusMusicBot.git . &&
      npm ci --only=production && 
      node src/index.js"
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - LAVALINK_HOST=lavalink
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}

  # This container downloads your application.yml configuration for Lavalink!
  lavalink_init:
    image: alpine
    container_name: virusmusic_lavalink_init
    volumes:
      - lavalink_data:/opt/Lavalink
    command: >
      sh -c "apk add --no-cache wget && 
      wget -O /opt/Lavalink/application.yml https://raw.githubusercontent.com/ErorrVirus/VirusMusicBot/main/application.yml"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.0.5
    container_name: virusmusic_lavalink
    restart: unless-stopped
    depends_on:
      lavalink_init:
        condition: service_completed_successfully
    environment:
      - _JAVA_OPTIONS=-Xmx1G
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - lavalink_data:/opt/Lavalink
    ports:
      - "2333:2333"

volumes:
  lavalink_data:
