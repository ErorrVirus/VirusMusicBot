version: '3.8'

services:
  bot:
    image: node:20-alpine
    container_name: virusmusicbot_bot
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - lavalink
    networks:
      - virusmusicbot_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: >
      sh -c "apk add --no-cache git curl &&
      rm -rf /app/* /app/.[!.]* &&
      git clone https://github.com/ErorrVirus/VirusMusicBot.git . &&
      npm install --omit=dev &&
      echo 'Waiting for Lavalink...' &&
      until curl -sf http://virusmusicbot_lavalink:2333/version; do sleep 5; done &&
      echo 'Lavalink ready! Starting bot...' &&
      node src/index.js"
    environment:
      - NODE_ENV=production
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - LAVALINK_HOST=virusmusicbot_lavalink
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.2.2
    container_name: virusmusicbot_lavalink
    restart: unless-stopped
    networks:
      - virusmusicbot_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
      - lavalink_plugins:/opt/Lavalink/plugins
    environment:
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_SPDC=${SPOTIFY_SPDC}
      - _JAVA_OPTIONS=-Xmx1G -Djava.net.preferIPv4Stack=true

volumes:
  lavalink_plugins:

networks:
  virusmusicbot_net:
    name: virusmusicbot_net
