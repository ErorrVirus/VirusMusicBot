services:
  bot:
    image: node:22-alpine
    container_name: virusmusic_bot
    restart: unless-stopped
    working_dir: /app
    network_mode: "host"
    depends_on:
      - lavalink
      - postgres
      - redis
    command: >
      sh -c "apk add --no-cache git && 
      rm -rf /app/* /app/.[!.]* /app/..?* &&
      git clone https://github.com/ErorrVirus/VirusMusicBot.git . &&
      npm ci --only=production && 
      node src/shard.js"
    environment:
      - PORT=3005
      - LAVALINK_HOST=127.0.0.1
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - POSTGRES_URL=postgresql://virusmusic:youshallnotpass@127.0.0.1:5432/virusmusic
      - REDIS_URL=redis://127.0.0.1:6379

  lavalink_init:
    image: alpine
    container_name: virusmusic_lavalink_init
    network_mode: "host"
    volumes:
      - lavalink_data:/opt/Lavalink
    command: >
      sh -c "apk add --no-cache wget && 
      wget -O /opt/Lavalink/application.yml https://raw.githubusercontent.com/ErorrVirus/VirusMusicBot/main/application.yml"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.0.8
    container_name: virusmusic_lavalink
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      lavalink_init:
        condition: service_completed_successfully
    environment:
      - _JAVA_OPTIONS=-Xmx1G -Djava.net.preferIPv4Stack=true
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
    volumes:
      - lavalink_data:/opt/Lavalink

  postgres:
    image: postgres:16-alpine
    container_name: virusmusic_postgres
    restart: unless-stopped
    network_mode: "host"
    environment:
      - POSTGRES_USER=virusmusic
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-youshallnotpass}
      - POSTGRES_DB=virusmusic
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: virusmusic_redis
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./data/redis:/data

  backup:
    image: alpine
    container_name: virusmusic_backup
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      - postgres
    environment:
      - POSTGRES_USER=virusmusic
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-youshallnotpass}
      - POSTGRES_DB=virusmusic
      - POSTGRES_HOST=127.0.0.1
    volumes:
      - ./backups:/backups
    command: >
      sh -c "apk add --no-cache postgresql-client zip &&
      echo 'Starting backup cron daemon...' &&
      echo '0 3 * * * PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER -d $$POSTGRES_DB -F c -f /tmp/db.dump && zip -j /backups/db-backup-$$(date +\\%Y-\\%m-\\%d).zip /tmp/db.dump && rm /tmp/db.dump' > /etc/crontabs/root &&
      crond -f -d 8"

volumes:
  lavalink_data:
